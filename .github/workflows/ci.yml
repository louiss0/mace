name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  go-test:
    name: go-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./...

  node-build:
    name: node-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Set up jpd
        run: npm install -g @jpd-tools/jpd

      - name: Install Node binding dependencies
        working-directory: bindings/node
        run: jpd install

      - name: Build Node binding
        working-directory: bindings/node
        run: jpd run build

  python-build:
    name: python-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        run: python -m pip install --user uv

      - name: Sync Python binding
        working-directory: bindings/python
        run: python -m uv sync

      - name: Build Python binding
        working-directory: bindings/python
        run: python -m uv build
