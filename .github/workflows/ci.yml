name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  go-test:
    name: go-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Go tests with coverage
        run: |
          go test -covermode=atomic -coverprofile=coverage.out ./...
          coverage=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          echo "total coverage: ${coverage}%"
          awk -v coverage="$coverage" 'BEGIN { if (coverage < 90) exit 1 }'

  node-build:
    name: node-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: bindings/node/pnpm-lock.yaml

      - name: Install Node binding dependencies
        working-directory: bindings/node
        run: pnpm install --frozen-lockfile

      - name: Build Node binding
        working-directory: bindings/node
        run: pnpm run build

  python-build:
    name: python-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        run: python -m pip install --user uv

      - name: Sync Python binding
        working-directory: bindings/python
        run: python -m uv sync

      - name: Build Python binding
        working-directory: bindings/python
        run: python -m uv build
