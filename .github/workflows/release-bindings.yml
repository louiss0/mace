name: release-bindings

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed

permissions:
  contents: read

jobs:
  publish-bindings:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          version_tag="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep '^v' | head -n 1 || true)"
          if [[ -z "$version_tag" ]]; then
            echo "Unable to find a v-prefixed tag for release SHA ${{ github.event.workflow_run.head_sha }}" >&2
            exit 1
          fi
          version="${version_tag#v}"
          echo "tag=$version_tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Configure 1Password
        uses: 1password/load-secrets-action/configure@v2
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Load publish tokens
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          NPM_TOKEN: op://Personal/For Astro NPM Token/credential
          PY_TEST_TOKEN: op://Personal/PY_TEST_TOKEN/credential
          PY_TOKEN: op://Personal/PY_TOKEN/credential

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up jpd
        run: npm install -g @jpd-tools/jpd

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        run: python -m pip install --user uv

      - name: Apply release version to Node package
        working-directory: bindings/node
        shell: bash
        run: |
          node -e "const fs=require('fs'); const path='package.json'; const pkg=JSON.parse(fs.readFileSync(path,'utf8')); pkg.version='${{ steps.version.outputs.version }}'; fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install and build Node binding
        working-directory: bindings/node
        run: |
          jpd install
          jpd run build

      - name: Publish Node binding
        working-directory: bindings/node
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: npm publish --access public

      - name: Apply release version to Python package
        working-directory: bindings/python
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('pyproject.toml')
          text = path.read_text()
          old = 'version = "0.1.0"'
          new = 'version = "${{ steps.version.outputs.version }}"'
          if old not in text:
              raise SystemExit('expected version entry not found in pyproject.toml')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Build Python binding
        working-directory: bindings/python
        run: |
          python -m uv sync
          python -m uv build

      - name: Publish Python binding to TestPyPI
        working-directory: bindings/python
        run: python -m uv publish --token "$PY_TEST_TOKEN" --publish-url https://test.pypi.org/legacy/

      - name: Publish Python binding to PyPI
        working-directory: bindings/python
        run: python -m uv publish --token "$PY_TOKEN"
